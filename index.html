<!doctype html>
<html lang="zh-CN" data-theme="dark">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>我的摄影作品</title>
  <style>
    :root {
      --bg: #eef7ff;
      --bg-gradient:
        radial-gradient(circle at 18% -8%, rgba(159, 208, 255, 0.72), transparent 28rem),
        radial-gradient(circle at 88% 2%, rgba(255, 255, 255, 0.92), transparent 24rem),
        radial-gradient(circle at 58% 42%, rgba(185, 221, 255, 0.38), transparent 34rem),
        linear-gradient(135deg, #f8fcff 0%, #eef7ff 46%, #dceeff 100%);
      --panel: rgba(255, 255, 255, 0.58);
      --panel-strong: rgba(255, 255, 255, 0.78);
      --text: #142033;
      --muted: rgba(20, 32, 51, 0.58);
      --line: rgba(97, 140, 184, 0.2);
      --accent: #9fd0ff;
      --accent-2: #d9efff;
      --chip-bg: rgba(255, 255, 255, 0.46);
      --filters-bg: rgba(255,255,255,0.66);
      --grid-line: rgba(64, 116, 166, 0.05);
      --shadow: 0 28px 80px rgba(0, 0, 0, 0.18);
    }

    [data-theme="dark"] {
      color-scheme: dark;
      --bg: #111a27;
      --bg-gradient:
        radial-gradient(circle at 16% -10%, rgba(111, 164, 225, 0.28), transparent 30rem),
        radial-gradient(circle at 86% 4%, rgba(148, 193, 238, 0.18), transparent 26rem),
        linear-gradient(150deg, #121b28 0%, #162235 52%, #101722 100%);
      --panel: rgba(255, 255, 255, 0.075);
      --panel-strong: rgba(255, 255, 255, 0.14);
      --text: #f0f5fb;
      --muted: rgba(226, 235, 247, 0.66);
      --line: rgba(189, 213, 240, 0.18);
      --accent: #8cc7ff;
      --accent-2: #416f9e;
      --chip-bg: rgba(255, 255, 255, 0.105);
      --filters-bg: rgba(27, 39, 58, 0.58);
      --grid-line: rgba(189, 213, 240, 0.035);
      --shadow: 0 24px 70px rgba(0, 0, 0, 0.34);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg-gradient);
      color: var(--text);
      transition: background 280ms ease, color 280ms ease;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background-image: linear-gradient(var(--grid-line) 1px, transparent 1px), linear-gradient(90deg, var(--grid-line) 1px, transparent 1px);
      background-size: 72px 72px;
      mask-image: linear-gradient(to bottom, black, transparent 78%);
    }

    .hero {
      position: relative;
      max-width: 1240px;
      margin: 0 auto;
      padding: 34px 22px 20px;
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 28px;
      align-items: end;
    }

    .hero::after {
      content: "";
      position: absolute;
      left: 22px;
      right: 22px;
      bottom: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--line), transparent);
    }

    .eyebrow {
      margin: 0 0 8px;
      color: var(--accent);
      font-size: 10px;
      font-weight: 800;
      letter-spacing: 0.22em;
      text-transform: uppercase;
    }

    h1 {
      margin: 0;
      max-width: 820px;
      font-size: clamp(28px, 4.6vw, 56px);
      letter-spacing: -0.08em;
      line-height: 0.9;
      text-wrap: balance;
    }

    .subtitle {
      margin: 10px 0 0;
      max-width: 560px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.65;
    }

    .hero-card {
      min-width: 140px;
      padding: 12px 14px;
      border: 1px solid var(--line);
      border-radius: 18px;
      background: linear-gradient(145deg, rgba(255,255,255,0.14), rgba(255,255,255,0.045));
      box-shadow: var(--shadow);
      backdrop-filter: blur(20px);
    }

    .hero-card strong {
      display: block;
      font-size: 24px;
      letter-spacing: -0.05em;
    }

    .hero-card span {
      color: var(--muted);
      font-size: 11px;
    }

    .hero-links {
      max-width: 1240px;
      margin: -4px auto 18px;
      padding: 0 22px;
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
      color: var(--muted);
      font-size: 12px;
    }

    .hero-links a, .qq-slot, .copyright {
      padding: 6px 10px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: var(--chip-bg);
      color: var(--muted);
      text-decoration: none;
    }

    .filters {
      position: sticky;
      top: 10px;
      z-index: 5;
      max-width: 1240px;
      margin: 0 auto 14px;
      padding: 8px 14px;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
      background: color-mix(in srgb, var(--filters-bg) 88%, transparent);
      border: 1px solid var(--line);
      border-radius: 999px;
      box-shadow: 0 18px 60px rgba(0, 0, 0, 0.14);
      backdrop-filter: blur(24px) saturate(1.25);
    }

    .filter-group {
      display: grid;
      grid-template-columns: auto auto;
      gap: 6px;
      align-items: center;
      min-height: 30px;
    }

    .filter-title {
      padding-top: 5px;
      color: var(--muted);
      font-size: 9px;
      font-weight: 800;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    .filter-toggle {
      padding: 5px 8px;
      font-size: 9px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    .filter-toggle::after {
      content: " 展开";
      letter-spacing: 0;
      font-weight: 700;
      text-transform: none;
    }

    .filter-group.open .filter-toggle::after { content: " 收起"; }

    .filter-group.collapsed .chips { display: none; }

    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
    }

    .best-toggle {
      margin-left: auto;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
      cursor: pointer;
    }

    .best-badge {
      position: absolute;
      top: 12px;
      right: 12px;
      z-index: 3;
      padding: 4px 8px;
      border-radius: 999px;
      background: #ffd36a;
      color: #2b1a00;
      font-size: 10px;
      font-weight: 900;
      letter-spacing: 0.08em;
    }

    button {
      border: 1px solid color-mix(in srgb, var(--line) 78%, transparent);
      background: color-mix(in srgb, var(--chip-bg) 86%, transparent);
      color: var(--text);
      border-radius: 999px;
      padding: 6px 10px;
      font: inherit;
      font-size: 11px;
      cursor: pointer;
      transition: transform 160ms ease, background 160ms ease, color 160ms ease, border-color 160ms ease, box-shadow 160ms ease;
    }

    button:hover {
      transform: translateY(-1px);
      border-color: var(--accent);
    }

    button.active {
      background: var(--accent);
      color: #07111d;
      border-color: var(--accent);
      box-shadow: 0 10px 28px rgba(185, 220, 255, 0.22);
      font-weight: 800;
    }

    .gallery {
      position: relative;
      max-width: 1240px;
      margin: 0 auto;
      padding: 0 22px 92px;
    }

    .photo-card {
      position: absolute;
      margin: 0;
      overflow: hidden;
      border: 0;
      border-radius: 0;
      background: transparent;
      box-shadow: none;
      cursor: zoom-in;
      isolation: isolate;
      transition: filter 220ms ease;
      will-change: transform;
    }

    .photo-card:hover {
      filter: brightness(1.04) saturate(1.04);
    }

    .photo-card::after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(to top, rgba(0,0,0,0.66), rgba(0,0,0,0.18) 42%, transparent 74%);
      opacity: 0;
      transition: opacity 220ms ease;
      z-index: 1;
    }

    .photo-card img {
      display: block;
      width: 100%;
      height: 100%;
      aspect-ratio: auto;
      object-fit: cover;
      filter: saturate(0.98) contrast(1.03);
      transition: filter 320ms ease;
    }

    .photo-card:hover::after { opacity: 1; }
    .photo-card:hover img { filter: saturate(1.06) contrast(1.08); }

    .meta {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      z-index: 2;
      padding: 28px 18px 16px;
      display: grid;
      gap: 4px;
      color: rgba(255,255,255,0.76);
      opacity: 0;
      transform: translateY(8px);
      transition: opacity 220ms ease, transform 220ms ease;
    }

    .photo-card:hover .meta { opacity: 1; transform: translateY(0); }

    .meta strong {
      color: white;
      font-size: 17px;
      letter-spacing: -0.02em;
      text-shadow: 0 2px 18px rgba(0,0,0,0.55);
    }

    .meta span { font-size: 12px; text-shadow: 0 1px 12px rgba(0,0,0,0.5); }

    .empty {
      max-width: 1240px;
      margin: 16px auto 80px;
      padding: 0 22px;
      color: var(--muted);
      display: none;
    }

    .lightbox {
      position: fixed;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 26px;
      background: rgba(0, 0, 0, 0.9);
      z-index: 10;
      backdrop-filter: blur(16px);
    }

    .lightbox.open { display: flex; }

    .lightbox-stage {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
      max-width: min(100%, 1220px);
    }

    .lightbox img {
      max-width: 100%;
      max-height: 82vh;
      border-radius: 24px;
      box-shadow: 0 28px 90px rgba(0, 0, 0, 0.72);
    }

    .lightbox-caption {
      display: flex;
      gap: 14px;
      align-items: baseline;
      color: rgba(255,255,255,0.92);
      text-align: center;
      flex-wrap: wrap;
      justify-content: center;
    }
    .lightbox-caption strong { font-size: 18px; letter-spacing: -0.01em; }
    .lightbox-caption span { color: rgba(255,255,255,0.62); font-size: 13px; }

    .lightbox button {
      position: fixed;
      background: rgba(255,255,255,0.92);
      color: #111;
      border: 0;
    }

    #closeLightbox { top: 22px; right: 22px; }
    .lightbox-nav {
      top: 50%;
      width: 44px;
      height: 44px;
      display: grid;
      place-items: center;
      font-size: 24px;
      transform: translateY(-50%);
    }
    #prevLightbox { left: 22px; }
    #nextLightbox { right: 22px; }

    @media (max-width: 780px) {
      .hero { grid-template-columns: 1fr; padding: 24px 14px 16px; gap: 14px; }
      .hero-card { width: 100%; box-shadow: 0 16px 44px rgba(0,0,0,0.14); }
      .hero-links { padding: 0 14px; gap: 6px; margin-bottom: 12px; }
      .hero-links a, .qq-slot, .copyright { padding: 5px 8px; font-size: 11px; }
      .filters {
        top: 6px;
        margin: 0 8px 8px;
        padding: 6px;
        display: flex;
        flex-wrap: nowrap;
        gap: 6px;
        overflow-x: auto;
        align-items: center;
        border-radius: 999px;
        background: color-mix(in srgb, var(--filters-bg) 66%, transparent);
        box-shadow: 0 10px 28px rgba(0,0,0,0.12);
        scrollbar-width: none;
      }
      .filters::-webkit-scrollbar { display: none; }
      .filter-group { display: inline-flex; grid-template-columns: none; gap: 4px; min-height: auto; align-items: center; flex: 0 0 auto; }
      .filter-title, .filter-toggle { width: auto; padding: 5px 8px; text-align: center; white-space: nowrap; }
      .chips { flex-wrap: nowrap; overflow: visible; gap: 4px; justify-content: flex-start; }
      .chips button { flex: 0 0 auto; padding: 5px 8px; font-size: 10px; white-space: nowrap; }
      .best-toggle { margin-left: 0; flex: 0 0 auto; justify-content: center; padding: 5px 8px; border: 1px solid var(--line); border-radius: 999px; background: var(--chip-bg); font-size: 10px; white-space: nowrap; }
      .filters > button { flex: 0 0 auto; white-space: nowrap; }
      .gallery { padding: 0 8px 80px; }
      .photo-card { border-radius: 0; }
      .meta { padding: 28px 12px 12px; }
      .meta strong { font-size: 14px; }
      .meta span { font-size: 11px; }
      .lightbox-caption strong { font-size: 16px; }
    }

    @media (max-width: 460px) {
      .filters { margin-inline: 6px; }
      .gallery { padding: 0 6px 70px; }
    }
  </style>
</head>

  <header class="hero">
    <div>
      <p class="eyebrow">Photo Archive</p>
      <h1 id="pageTitle">香菇出过的角色展示</h1>
      <p class="subtitle" id="pageSubtitle">用更沉浸的瀑布流展示香菇出过的角色，按角色、摄影师或月份快速筛选。</p>
    </div>
    <div class="hero-card">
      <strong>29</strong>
      <span>张已收录作品</span>
    </div>
  </header>

  <nav class="hero-links" aria-label="友情链接">
    <a href="https://calmdream.cn/">友情链接-宁梦</a>
    <a href="https://lx233.github.io/">友情链接-香菇猫</a>

    <span class="qq-slot">QQ 扩列：3223591937</span>
    <span class="copyright">copy right by 香菇</span>
  </nav>

  <section class="filters" aria-label="图片筛选">
    <div class="filter-group">
      <div class="filter-title">摄影师</div>
      <div class="chips" id="categoryFilters"></div>
    </div>
    <div class="filter-group collapsed" id="monthFilterGroup">
      <button type="button" class="filter-title filter-toggle" id="monthToggle">月份</button>
      <div class="chips" id="monthFilters"></div>
    </div>
    <div class="filter-group collapsed" id="roleFilterGroup">
      <button type="button" class="filter-title filter-toggle" id="roleToggle">角色</button>
      <div class="chips" id="roleFilters"></div>
    </div>
    <label class="best-toggle">
      <input type="checkbox" id="bestOnly">
      单图模式
    </label>
    <button type="button" id="shuffleButton">打乱</button>
    <button type="button" id="weightSortButton">按权重</button>
    <button type="button" id="themeToggle">🌙 夜间</button>
  </section>

  <main class="gallery" id="gallery"></main>
  <p class="empty" id="empty">暂无匹配图片。</p>

  <div class="lightbox" id="lightbox" aria-hidden="true">
    <button type="button" id="closeLightbox">关闭</button>
    <button type="button" class="lightbox-nav" id="prevLightbox">‹</button>
    <div class="lightbox-stage">
      <img id="lightboxImage" alt="">
      <div class="lightbox-caption">
        <strong id="lightboxRole"></strong>
        <span id="lightboxInfo"></span>
      </div>
    </div>
    <button type="button" class="lightbox-nav" id="nextLightbox">›</button>
  </div>

        card.append(image, meta);
        card.addEventListener('click', () => {
          openLightbox(visibleImages.indexOf(item));
        });
        gallery.appendChild(card);
      }
      layoutMasonry();
    }

    function openLightbox(index) {
      if (!visibleImages.length) return;
      currentLightboxIndex = (index + visibleImages.length) % visibleImages.length;
      const item = visibleImages[currentLightboxIndex];
      lightboxImage.onerror = item.fallbackSrc ? () => {
        lightboxImage.onerror = null;
        lightboxImage.src = item.fallbackSrc;
      } : null;
      lightboxImage.src = item.src;
      lightboxImage.alt = item.fileName;
      lightboxRole.textContent = item.role;
      lightboxInfo.textContent = '摄影：' + item.category + ' · ' + item.month;
      lightbox.classList.add('open');
      lightbox.setAttribute('aria-hidden', 'false');
    }

    function moveLightbox(step) {
      if (!lightbox.classList.contains('open')) return;
      openLightbox(currentLightboxIndex + step);
    }

    function renderAll() {
      renderFilters('categoryFilters', 'category');
      renderFilters('monthFilters', 'month');
      renderFilters('roleFilters', 'role');
      if (state.month !== '全部') monthFilterGroup.classList.add('open');
      if (state.role !== '全部') roleFilterGroup.classList.add('open');
      monthFilterGroup.classList.toggle('collapsed', !monthFilterGroup.classList.contains('open'));
      roleFilterGroup.classList.toggle('collapsed', !roleFilterGroup.classList.contains('open'));
      updateHeroCopy();
      updateSortButtons();
      renderGallery();
    }

    document.getElementById('closeLightbox').addEventListener('click', () => {
      lightbox.classList.remove('open');
      lightbox.setAttribute('aria-hidden', 'true');
      lightboxImage.removeAttribute('src');
      currentLightboxIndex = -1;
    });

    document.getElementById('prevLightbox').addEventListener('click', (event) => {
      event.stopPropagation();
      moveLightbox(-1);
    });

    document.getElementById('nextLightbox').addEventListener('click', (event) => {
      event.stopPropagation();
      moveLightbox(1);
    });

    monthToggle.addEventListener('click', () => {
      monthFilterGroup.classList.toggle('open');
      monthFilterGroup.classList.toggle('collapsed', !monthFilterGroup.classList.contains('open'));
    });

    roleToggle.addEventListener('click', () => {
      roleFilterGroup.classList.toggle('open');
      roleFilterGroup.classList.toggle('collapsed', !roleFilterGroup.classList.contains('open'));
    });

    bestOnly.addEventListener('change', () => {
      state.bestOnly = bestOnly.checked;
      syncUrl();
      renderGallery();
    });

    shuffleButton.addEventListener('click', () => {
      state.shuffle = true;
      assignShuffleNoise();
      syncUrl();
      updateSortButtons();
      renderGallery();
    });

    weightSortButton.addEventListener('click', () => {
      state.shuffle = false;
      syncUrl();
      updateSortButtons();
      renderGallery();
    });

    lightbox.addEventListener('click', (event) => {
      if (event.target === lightbox) document.getElementById('closeLightbox').click();
    });

    window.addEventListener('keydown', (event) => {
      if (event.key === 'Escape') document.getElementById('closeLightbox').click();
      if (event.key === 'ArrowLeft') moveLightbox(-1);
      if (event.key === 'ArrowRight') moveLightbox(1);
      if (event.key === 'ArrowLeft') moveLightbox(-1);
      if (event.key === 'ArrowRight') moveLightbox(1);
    });

    window.addEventListener('resize', () => {
      window.requestAnimationFrame(layoutMasonry);
    });

    readStateFromUrl();
    renderAll();
  </script>
</body>
</html>
